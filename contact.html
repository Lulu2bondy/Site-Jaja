<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Martin Fenêtres</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Martin Fenêtres</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="creations.html">Réalisations</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <section>
            <h2>Contactez-nous</h2>
            <p>Une question ? Un devis gratuit ? Remplissez le formulaire ci-dessous.</p>
        </section>

        <section>
            <form action="#" method="post">

                <label for="name">Nom :</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email :</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="phone">Téléphone :</label><br>
                <input type="tel" id="phone" name="phone"><br><br>

                <label for="message">Message :</label><br>
                <textarea id="message" name="message" rows="6" required></textarea><br><br>

                <button type="submit">Envoyer</button>

            </form>
        </section>

        <section>
            <h2>Informations</h2>
            <p><strong>Téléphone :</strong> 06 00 00 00 00</p>
            <p><strong>Email :</strong> contact@martin-fenetres.fr</p>
            <p><strong>Zone :</strong> Reims et alentours</p>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Martin Fenêtres</p>
    </footer>

</body>
</html>
